<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Catálago de músicas</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
        }
        a1 {
            font-variant: small-caps;
            font-size: 3rem;
            color: rgb(202, 39, 39);
            text-align:left;
            margin: 20px 0000 20px 0;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 8px 18px rgba(202, 39, 39, 0.25), 0 4px 10px rgba(0, 0, 0, 0.75);
        }
        .bands {

            gap: 58px;
            margin: 30px auto 60px auto;
            max-width: 1100px;
            
        }

        .bands img {
            width: 720px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .bands img:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.6);
        }
        #Metallica {
            position: fixed;
            top: 10px;
            right: 10px;
        }

        .list {
            font-size: 3rem;
                margin: 0 0 0 50px;
                padding: 0;
                list-style-type: none;
        }
        .list li {
            margin: 20px 0;
        }
        .list li a {
            color: #ffffff;
            text-decoration: none;
            transition: color .2s ease;
        }
        </style>
        </head>
<body>
