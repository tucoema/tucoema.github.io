<!DOCTYPE html>
<html>
<head>
    <title>História das bandas</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            font-variant: small-caps;
            font-size: 5rem;
            color: rgb(202, 39, 39);
            text-align: center;
            margin: 40px 0 20px 0;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 8px 18px rgba(202, 39, 39, 0.25), 0 4px 10px rgba(0, 0, 0, 0.75);
        }
    .meu-botao {
        font: 200;
        background-color: #ffffff;
        color: rgb(0, 0, 0);            
        border: none;          
        padding: 12px 24px;     
        font-size: 16px;          
        border-radius: 8px;      
        cursor: pointer;          
        transition: background-color 0.3s;
    }
        
        .meu-botao :hover {
            background-color: rgb(129, 47, 47);
        }
        .bands {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin: 30px auto 60px auto;
            max-width: 1100px;
            align-items: center;
        }

        .bands img {
            width: 300px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: transform .2s ease, box-shadow .2s ease;
        }

        .bands img:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.6);
        }

        .bands a {
            display: inline-block;
            text-decoration: none;
        }

        .bands a img {
            display: block;
        }

    </style>
</head>

<style>
    .botao {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 15px 25px;
        background-color: #ea0000;
        color: rgb(0, 0, 0);
        text-decoration: none;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        box-shadow: 0 4px 6px rgba(255, 255, 255, 0.1);
        transition: background-color 0.3s;
        z-index: 9999;
